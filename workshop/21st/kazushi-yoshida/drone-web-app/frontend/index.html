<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドローン Web 制御</title>
  <link rel="stylesheet" href="/static/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>ドローン Web 制御</h1>
    <span id="ws-indicator" class="ws-indicator ws-off">サーバー未接続</span>
  </header>

  <main>
    <section class="panels">
      <!-- ステータスパネル -->
      <div class="panel" id="status-panel">
        <h2>ステータス</h2>
        <ul class="status-list">
          <li><span>接続状態</span><b id="st-connected">未接続</b></li>
          <li><span>アーム状態</span><b id="st-armed">DISARMED</b></li>
          <li><span>フライトモード</span><b id="st-mode">UNKNOWN</b></li>
          <li><span>緯度</span><b id="st-lat">0.000000</b></li>
          <li><span>経度</span><b id="st-lon">0.000000</b></li>
          <li><span>高度 (m)</span><b id="st-alt">0.00</b></li>
          <li><span>ヘディング (°)</span><b id="st-hdg">0</b></li>
        </ul>
      </div>

      <!-- コントロールパネル -->
      <div class="panel" id="control-panel">
        <h2>コントロール</h2>

        <div class="control-group">
          <button id="btn-connect" class="primary">接続</button>
        </div>

        <div class="control-group">
          <button id="btn-arm">アーム</button>
          <button id="btn-disarm">ディスアーム</button>
          <button id="btn-land">着陸</button>
        </div>

        <div class="control-group">
          <label>離陸高度 (m)</label>
          <input id="in-takeoff-alt" type="number" value="10" step="1" min="1" />
          <button id="btn-takeoff">離陸</button>
        </div>

        <div class="control-group">
          <label>GoTo</label>
          <input id="in-goto-lat" type="number" placeholder="緯度" step="0.000001" />
          <input id="in-goto-lon" type="number" placeholder="経度" step="0.000001" />
          <input id="in-goto-alt" type="number" placeholder="高度(m)" value="10" step="1" />
          <button id="btn-goto">移動</button>
        </div>

        <div class="control-group">
          <label>モード</label>
          <select id="sel-mode">
            <option value="GUIDED">GUIDED</option>
            <option value="AUTO">AUTO</option>
            <option value="RTL">RTL</option>
            <option value="LOITER">LOITER</option>
            <option value="STABILIZE">STABILIZE</option>
          </select>
          <button id="btn-mode">設定</button>
        </div>

        <div id="log" class="log"></div>
      </div>
    </section>

    <!-- 地図領域 -->
    <section class="map-section">
      <div id="map"></div>
    </section>
  </main>

  <script src="/static/leaflet/leaflet.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
