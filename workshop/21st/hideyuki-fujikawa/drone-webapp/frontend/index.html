<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drone Web App</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Drone Web App</h1>
    <p id="message" class="message">&nbsp;</p>
  </header>

  <div class="container">
    <div class="side">
      <!-- ステータスパネル -->
      <section class="panel">
        <h2>ステータス</h2>
        <table class="status-table">
          <tr><th>接続状態</th><td id="st-connected">未接続</td></tr>
          <tr><th>アーム状態</th><td id="st-armed">DISARM</td></tr>
          <tr><th>フライトモード</th><td id="st-mode">UNKNOWN</td></tr>
          <tr><th>緯度</th><td id="st-lat">0.000000</td></tr>
          <tr><th>経度</th><td id="st-lon">0.000000</td></tr>
          <tr><th>高度 [m]</th><td id="st-alt">0.00</td></tr>
          <tr><th>ヘディング [°]</th><td id="st-heading">0</td></tr>
        </table>
      </section>

      <!-- コントロールパネル -->
      <section class="panel">
        <h2>コントロール</h2>

        <div class="control-row">
          <button id="btn-connect" class="primary">接続</button>
          <button id="btn-arm">アーム</button>
          <button id="btn-disarm">ディスアーム</button>
          <button id="btn-land">着陸</button>
        </div>

        <div class="control-row">
          <label for="takeoff-alt">離陸高度 [m]</label>
          <input type="number" id="takeoff-alt" value="10" min="1" step="1">
          <button id="btn-takeoff">離陸</button>
        </div>

        <fieldset class="control-group">
          <legend>GoTo</legend>
          <div class="control-row">
            <label for="goto-lat">緯度</label>
            <input type="number" id="goto-lat" value="35.681236" step="0.000001">
          </div>
          <div class="control-row">
            <label for="goto-lon">経度</label>
            <input type="number" id="goto-lon" value="139.767125" step="0.000001">
          </div>
          <div class="control-row">
            <label for="goto-alt">高度 [m]</label>
            <input type="number" id="goto-alt" value="10" min="1" step="1">
            <button id="btn-goto">移動</button>
          </div>
        </fieldset>

        <div class="control-row">
          <label for="mode-select">モード</label>
          <select id="mode-select">
            <option value="GUIDED">GUIDED</option>
            <option value="AUTO">AUTO</option>
            <option value="RTL">RTL</option>
            <option value="LOITER">LOITER</option>
            <option value="STABILIZE">STABILIZE</option>
          </select>
          <button id="btn-mode">設定</button>
        </div>
      </section>
    </div>

    <!-- 地図領域 -->
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
