<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ドローン Web 制御</title>
  <!-- Leaflet（ローカル同梱: オフライン/ホットスポットでも動作） -->
  <link rel="stylesheet" href="/static/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>ドローン Web 制御</h1>
    <span id="ws-indicator" class="badge badge-off">サーバー未接続</span>
  </header>

  <main>
    <div class="panels">
      <!-- ステータスパネル -->
      <section class="panel" id="status-panel">
        <h2>ステータス</h2>
        <table class="status-table">
          <tbody>
            <tr><th>接続状態</th><td id="st-connected">未接続</td></tr>
            <tr><th>アーム状態</th><td id="st-armed">DISARMED</td></tr>
            <tr><th>フライトモード</th><td id="st-mode">UNKNOWN</td></tr>
            <tr><th>緯度</th><td id="st-lat">0.000000</td></tr>
            <tr><th>経度</th><td id="st-lon">0.000000</td></tr>
            <tr><th>高度 (m)</th><td id="st-alt">0.00</td></tr>
            <tr><th>ヘディング (°)</th><td id="st-hdg">0</td></tr>
          </tbody>
        </table>
      </section>

      <!-- コントロールパネル -->
      <section class="panel" id="control-panel">
        <h2>コントロール</h2>

        <div class="control-group">
          <button id="btn-connect">接続</button>
          <button id="btn-arm">アーム</button>
          <button id="btn-disarm">ディスアーム</button>
          <button id="btn-land">着陸</button>
        </div>

        <div class="control-group">
          <label>離陸高度 (m)
            <input type="number" id="in-takeoff-alt" value="10" min="1" step="1" />
          </label>
          <button id="btn-takeoff">離陸</button>
        </div>

        <div class="control-group goto-group">
          <label>緯度
            <input type="number" id="in-goto-lat" value="35.681236" step="0.000001" />
          </label>
          <label>経度
            <input type="number" id="in-goto-lon" value="139.767125" step="0.000001" />
          </label>
          <label>高度 (m)
            <input type="number" id="in-goto-alt" value="10" min="1" step="1" />
          </label>
          <button id="btn-goto">GoTo</button>
        </div>

        <div class="control-group">
          <label>モード
            <select id="sel-mode">
              <option value="GUIDED">GUIDED</option>
              <option value="AUTO">AUTO</option>
              <option value="RTL">RTL</option>
              <option value="LOITER">LOITER</option>
              <option value="STABILIZE">STABILIZE</option>
            </select>
          </label>
          <button id="btn-mode">モード設定</button>
        </div>

        <div id="log" class="log"></div>
      </section>
    </div>

    <!-- 地図領域 -->
    <section class="panel map-panel">
      <h2>地図</h2>
      <div id="map"></div>
    </section>
  </main>

  <script src="/static/leaflet/leaflet.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
