<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Web App</title>
  <!-- インライン SVG favicon（別ファイル不要 & /favicon.ico の 404 を防ぐ）。 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚁</text></svg>" />
  <!-- Leaflet はローカル同梱（CDN/SRI 依存を排除）。 -->
  <link rel="stylesheet" href="/static/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body>
  <header>
    <h1>🚁 Drone Web App</h1>
    <span id="ws-indicator" class="badge disconnected">サーバー未接続</span>
  </header>

  <main>
    <section class="panels">
      <!-- ステータスパネル -->
      <div class="card" id="status-panel">
        <h2>ステータス</h2>
        <ul class="status-list">
          <li><span>接続状態</span><b id="st-connected">未接続</b></li>
          <li><span>アーム状態</span><b id="st-armed">DISARMED</b></li>
          <li><span>フライトモード</span><b id="st-mode">UNKNOWN</b></li>
          <li><span>緯度</span><b id="st-lat">0.000000</b></li>
          <li><span>経度</span><b id="st-lon">0.000000</b></li>
          <li><span>高度 (m)</span><b id="st-alt">0.00</b></li>
          <li><span>ヘディング (°)</span><b id="st-hdg">0</b></li>
        </ul>
      </div>

      <!-- コントロールパネル -->
      <div class="card" id="control-panel">
        <h2>コントロール</h2>

        <div class="btn-row">
          <button id="btn-connect" class="primary">接続</button>
          <button id="btn-arm">アーム</button>
          <button id="btn-disarm">ディスアーム</button>
          <button id="btn-land" class="warn">着陸</button>
        </div>

        <div class="field">
          <label for="in-takeoff-alt">離陸高度 (m)</label>
          <div class="inline">
            <input id="in-takeoff-alt" type="number" value="10" min="0" step="1" />
            <button id="btn-takeoff">離陸</button>
          </div>
        </div>

        <div class="field">
          <label>GoTo 目標</label>
          <div class="inline">
            <input id="in-goto-lat" type="number" placeholder="緯度" step="0.000001" />
            <input id="in-goto-lon" type="number" placeholder="経度" step="0.000001" />
            <input id="in-goto-alt" type="number" placeholder="高度(m)" step="1" value="10" />
            <button id="btn-goto">GoTo</button>
          </div>
        </div>

        <div class="field">
          <label for="sel-mode">モード変更</label>
          <div class="inline">
            <select id="sel-mode">
              <option value="GUIDED">GUIDED</option>
              <option value="AUTO">AUTO</option>
              <option value="RTL">RTL</option>
              <option value="LOITER">LOITER</option>
              <option value="STABILIZE">STABILIZE</option>
            </select>
            <button id="btn-mode">設定</button>
          </div>
        </div>

        <div id="log" class="log">メッセージはここに表示されます</div>
      </div>
    </section>

    <!-- 地図 -->
    <section class="card map-card">
      <div id="map"></div>
    </section>
  </main>

  <script src="/static/vendor/leaflet/leaflet.js"></script>
  <script src="/static/script.js?v=3"></script>
</body>
</html>
